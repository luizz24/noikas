name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.6'
          cache-disabled: true

      - name: Remover local.properties (específico de máquina, não deve estar no repositório)
        run: rm -f local.properties

      - name: Gerar o Gradle Wrapper oficial do projeto
        run: gradle wrapper --gradle-version 8.6

      - name: Compilar APK de debug
        id: build
        continue-on-error: true
        run: ./gradlew clean assembleDebug --no-daemon --stacktrace

      - name: "DIAGNÓSTICO: mostrar o conteúdo real que o Gradle mesclou"
        if: steps.build.outcome == 'failure'
        run: |
          echo "===================== activity_main.xml (mesclado) ====================="
          find app/build -name "activity_main.xml" -exec echo ">>> {}" \; -exec cat {} \;
          echo "===================== activity_add_edit_materia.xml (mesclado) ====================="
          find app/build -name "activity_add_edit_materia.xml" -exec echo ">>> {}" \; -exec cat {} \;
          echo "===================== item_materia.xml (mesclado, para comparar) ====================="
          find app/build -name "item_materia.xml" -exec echo ">>> {}" \; -exec cat {} \;
          echo "===================== Buscando qualquer attrs.xml customizado no projeto ====================="
          find app/src -name "attrs.xml" -exec echo ">>> {}" \; -exec cat {} \;
          echo "===================== Conteúdo da pasta values/ enviada ====================="
          ls -la app/src/main/res/values/

      - name: Encerrar com erro se a compilação falhou
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Disponibilizar o APK gerado para download
        uses: actions/upload-artifact@v4
        with:
          name: MediaEscolar-apk
          path: app/build/outputs/apk/debug/app-debug.apk
